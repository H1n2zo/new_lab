<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NewsWire</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="logo">📡 NewsWire</span>
    <span class="tagline">Lab Practical 2</span>
  </header>

  <section class="search-bar">
    <select id="categorySelect">
      <option value="">Category</option>
      <option value="technology">Technology</option>
      <option value="sports">Sports</option>
      <option value="business">Business</option>
      <option value="entertainment">Entertainment</option>
      <option value="health">Health</option>
      <option value="science">Science</option>
      <option value="general">General</option>
    </select>
    <input type="text" id="keywordInput" placeholder="Or search a keyword..." />
    <button id="fetchBtn" onclick="fetchNews()">Search</button>
  </section>

  <div id="statusBar" class="status hidden"></div>

  <main id="newsGrid" class="news-grid">
    <p class="hint">Select a category or type a keyword to get started.</p>
  </main>

  <footer>
    NewsWire · Lab Practical 2 · Data from <a href="https://newsapi.org" target="_blank">NewsAPI.org</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
